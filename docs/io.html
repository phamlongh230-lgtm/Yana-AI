<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>IO — YAMTAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --font: 'Inter', -apple-system, 'SF Pro Display', system-ui, sans-serif;

  /* Background layers */
  --bg-base:    #0a0a14;
  --orb-1:      hsla(248, 80%, 55%, .45);
  --orb-2:      hsla(200, 90%, 50%, .30);
  --orb-3:      hsla(310, 70%, 55%, .20);

  /* Glass tokens — iOS 26 Liquid Glass */
  --glass-bg:         rgba(255,255,255,.07);
  --glass-bg-strong:  rgba(255,255,255,.11);
  --glass-border:     rgba(255,255,255,.14);
  --glass-border-top: rgba(255,255,255,.22);
  --glass-shadow:     0 8px 40px rgba(0,0,0,.45), 0 1px 0 var(--glass-border-top) inset;
  --glass-blur:       blur(28px) saturate(180%);

  /* Text */
  --fg:        rgba(255,255,255,.95);
  --fg-sec:    rgba(255,255,255,.55);
  --fg-ter:    rgba(255,255,255,.35);

  /* Accent */
  --accent:       hsl(221,90%,62%);
  --accent-soft:  hsla(221,90%,62%,.18);
  --accent-glow:  hsla(221,90%,62%,.35);

  /* Bubble colors */
  --user-glass:  hsla(221,85%,58%,.22);
  --user-border: hsla(221,85%,70%,.25);
  --ai-glass:    rgba(255,255,255,.06);
  --ai-border:   rgba(255,255,255,.10);

  --radius-xl: 28px;
  --radius-lg: 20px;
  --radius-md: 14px;
  --radius-sm: 10px;
  --radius-pill: 999px;
}

html, body {
  height: 100%; width: 100%;
  background: var(--bg-base);
  color: var(--fg);
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.55;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── Animated background orbs ── */
.bg-canvas {
  position: fixed; inset: 0; z-index: 0;
  overflow: hidden; pointer-events: none;
}
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  will-change: transform;
}
.orb-1 {
  width: 60vmax; height: 60vmax;
  background: var(--orb-1);
  top: -20%; left: -10%;
  animation: drift1 18s ease-in-out infinite alternate;
}
.orb-2 {
  width: 50vmax; height: 50vmax;
  background: var(--orb-2);
  bottom: -15%; right: -5%;
  animation: drift2 22s ease-in-out infinite alternate;
}
.orb-3 {
  width: 40vmax; height: 40vmax;
  background: var(--orb-3);
  top: 30%; left: 40%;
  animation: drift3 15s ease-in-out infinite alternate;
}

/* ── App shell ── */
.shell {
  position: relative; z-index: 1;
  display: grid;
  grid-template-rows: auto 1fr auto;
  height: 100dvh;
  max-width: 680px;
  margin: 0 auto;
  padding: 0 1rem env(safe-area-inset-bottom, 1rem);
  gap: .75rem;
}

/* ── Header — liquid glass bar ── */
.header {
  margin-top: max(env(safe-area-inset-top, .75rem), .75rem);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  background: var(--glass-bg-strong);
  border: 1px solid var(--glass-border);
  border-top-color: var(--glass-border-top);
  box-shadow: var(--glass-shadow);
  border-radius: var(--radius-xl);
  padding: .65rem 1rem .65rem .75rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: .75rem;
}

.header-left {
  display: flex; align-items: center; gap: .75rem;
}

/* Avatar pill */
.avatar-pill {
  display: flex; align-items: center; gap: .55rem;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-pill);
  padding: .2rem .75rem .2rem .2rem;
  cursor: default;
}
.avatar-ring {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: rgba(0,0,0,.3);
  border: 1.5px solid var(--glass-border-top);
  overflow: hidden;
  flex-shrink: 0;
  position: relative;
}
.avatar-ring::after {
  content: '';
  position: absolute; inset: 0;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(255,255,255,.12) 0%, transparent 60%);
  pointer-events: none;
}
#avatar-lottie { width: 100%; height: 100%; transform: scale(1.5); }

.avatar-info { display: flex; flex-direction: column; gap: 1px; }
.avatar-name  { font-size: .82rem; font-weight: 600; letter-spacing: -.01em; }
.avatar-status {
  display: flex; align-items: center; gap: .35rem;
  font-size: .68rem; color: var(--fg-sec);
  font-weight: 400; letter-spacing: .01em;
}
.dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #34d058;
  box-shadow: 0 0 5px #34d058;
  transition: background .3s, box-shadow .3s;
  flex-shrink: 0;
}
.dot.thinking {
  background: #fbbf24;
  box-shadow: 0 0 6px #fbbf24;
  animation: blink .7s ease-in-out infinite;
}
.dot.responding {
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
}

.header-back {
  backdrop-filter: blur(12px) saturate(160%);
  -webkit-backdrop-filter: blur(12px) saturate(160%);
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-pill);
  padding: .4rem .85rem;
  color: var(--fg-sec);
  text-decoration: none;
  font-size: .78rem;
  font-weight: 500;
  letter-spacing: -.01em;
  transition: background .15s, color .15s;
  white-space: nowrap;
}
.header-back:hover {
  background: var(--glass-bg-strong);
  color: var(--fg);
}

/* ── Messages ── */
.feed {
  overflow-y: auto;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  gap: .65rem;
  padding: .25rem 0 .5rem;
  scrollbar-width: none;
}
.feed::-webkit-scrollbar { display: none; }

.msg {
  display: flex;
  align-items: flex-end;
  gap: .55rem;
  animation: msgIn .28s cubic-bezier(.34,1.56,.64,1);
}
.msg.user { flex-direction: row-reverse; }

.msg-av {
  width: 28px; height: 28px;
  border-radius: 50%;
  flex-shrink: 0;
  overflow: hidden;
  background: rgba(0,0,0,.25);
  border: 1px solid var(--glass-border-top);
  position: relative;
}
.msg-av::after {
  content: '';
  position: absolute; inset: 0; border-radius: 50%;
  background: linear-gradient(135deg, rgba(255,255,255,.10) 0%, transparent 55%);
  pointer-events: none;
}
.msg-av-inner { width: 100%; height: 100%; transform: scale(1.4); }

.user-av {
  width: 28px; height: 28px;
  border-radius: 50%;
  flex-shrink: 0;
  background: linear-gradient(135deg, var(--accent), hsl(265,80%,62%));
  display: flex; align-items: center; justify-content: center;
  font-size: .6rem; font-weight: 700; color: #fff;
  letter-spacing: .03em;
  border: 1px solid rgba(255,255,255,.2);
  box-shadow: 0 2px 10px var(--accent-glow);
}

.bubble {
  max-width: min(72%, 480px);
  padding: .7rem 1rem;
  font-size: .88rem;
  line-height: 1.6;
  word-break: break-word;
  position: relative;
}

.msg.ai .bubble {
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  background: var(--ai-glass);
  border: 1px solid var(--ai-border);
  border-top-color: rgba(255,255,255,.16);
  border-radius: var(--radius-sm) var(--radius-lg) var(--radius-lg) var(--radius-lg);
  box-shadow: 0 4px 20px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.08);
}
.msg.user .bubble {
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  background: var(--user-glass);
  border: 1px solid var(--user-border);
  border-top-color: hsla(221,85%,80%,.3);
  border-radius: var(--radius-lg) var(--radius-sm) var(--radius-lg) var(--radius-lg);
  box-shadow: 0 4px 20px rgba(0,0,0,.2), inset 0 1px 0 rgba(255,255,255,.08);
  color: rgba(255,255,255,.9);
}

/* Thinking dots */
.think-wrap {
  display: flex; align-items: center; gap: 5px;
  padding: .75rem 1rem;
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  background: var(--ai-glass);
  border: 1px solid var(--ai-border);
  border-top-color: rgba(255,255,255,.16);
  border-radius: var(--radius-sm) var(--radius-lg) var(--radius-lg) var(--radius-lg);
  box-shadow: 0 4px 20px rgba(0,0,0,.25);
}
.think-wrap span {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--fg-sec);
  animation: bounce .85s ease-in-out infinite;
}
.think-wrap span:nth-child(2) { animation-delay: .14s; }
.think-wrap span:nth-child(3) { animation-delay: .28s; }

/* code */
code {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: .78em;
  background: rgba(255,255,255,.08);
  padding: .1em .38em;
  border-radius: 5px;
  border: 1px solid rgba(255,255,255,.10);
  color: rgba(180,210,255,.9);
}

/* ── Input bar ── */
.inputbar {
  padding-bottom: max(env(safe-area-inset-bottom, .75rem), .5rem);
}
.input-glass {
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  background: var(--glass-bg-strong);
  border: 1px solid var(--glass-border);
  border-top-color: var(--glass-border-top);
  box-shadow: var(--glass-shadow);
  border-radius: var(--radius-xl);
  padding: .55rem .55rem .55rem .9rem;
  display: flex;
  align-items: flex-end;
  gap: .55rem;
}
#user-input {
  flex: 1;
  background: transparent;
  border: none; outline: none;
  color: var(--fg);
  font-family: var(--font);
  font-size: .9rem;
  line-height: 1.5;
  resize: none;
  height: 32px;
  max-height: 120px;
  padding: 4px 0;
  scrollbar-width: none;
  caret-color: var(--accent);
}
#user-input::-webkit-scrollbar { display: none; }
#user-input::placeholder { color: var(--fg-ter); }

#send-btn {
  width: 36px; height: 36px;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, var(--accent), hsl(265,80%,60%));
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 2px 12px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,.2);
  transition: transform .15s, box-shadow .15s, opacity .15s;
}
#send-btn:hover  { transform: scale(1.05); box-shadow: 0 4px 20px var(--accent-glow); }
#send-btn:active { transform: scale(.95); }
#send-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }
#send-btn svg { width: 16px; height: 16px; fill: #fff; }

/* ── Keyframes ── */
@keyframes drift1 {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(6%,8%) scale(1.08); }
}
@keyframes drift2 {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(-5%,-6%) scale(1.1); }
}
@keyframes drift3 {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(4%,-5%) scale(.92); }
}
@keyframes blink {
  0%,100% { opacity: 1; }
  50%      { opacity: .3; }
}
@keyframes bounce {
  0%,80%,100% { transform: translateY(0); }
  40%          { transform: translateY(-5px); }
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(12px) scale(.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
</style>
</head>
<body>

<!-- Background -->
<div class="bg-canvas">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="shell">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="avatar-pill">
        <div class="avatar-ring">
          <div id="avatar-lottie"></div>
        </div>
        <div class="avatar-info">
          <span class="avatar-name">YAMTAM IO</span>
          <span class="avatar-status">
            <span class="dot" id="dot"></span>
            <span id="status-txt">Sẵn sàng</span>
          </span>
        </div>
      </div>
    </div>
    <a class="header-back" href="index.html">← Trang chủ</a>
  </header>

  <!-- Feed -->
  <div class="feed" id="feed">
    <div class="msg ai">
      <div class="msg-av"><div class="msg-av-inner" id="welcome-av"></div></div>
      <div class="bubble">
        Xin chào. Tôi là <code>YAMTAM IO</code>.<br>
        Hỏi tôi bất cứ điều gì — tôi sẽ route đúng agent cho bạn.
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="inputbar">
    <div class="input-glass">
      <textarea id="user-input" placeholder="Nhắn gì đó…" rows="1"></textarea>
      <button id="send-btn" aria-label="Gửi">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

</div>

<script>
// ── Lottie ──
function makeLottie(el, autoplay) {
  return lottie.loadAnimation({
    container: el, renderer: 'svg',
    loop: true, autoplay: !!autoplay,
    path: 'chatgpt-atlas-animation.json'
  });
}
const headerAnim = makeLottie(document.getElementById('avatar-lottie'), false);
makeLottie(document.getElementById('welcome-av'), false);

// ── State ──
let busy = false;

function setState(s) {
  const dot = document.getElementById('dot');
  const txt = document.getElementById('status-txt');
  dot.className = 'dot';
  if (s === 'idle') {
    headerAnim.stop(); txt.textContent = 'Sẵn sàng';
  } else if (s === 'thinking') {
    headerAnim.setSpeed(1.8); headerAnim.play();
    dot.classList.add('thinking'); txt.textContent = 'Đang nghĩ…';
  } else if (s === 'responding') {
    headerAnim.setSpeed(1); headerAnim.play();
    dot.classList.add('responding'); txt.textContent = 'Đang trả lời';
  }
}

// ── Demo replies ──
const demos = [
  'Tôi có thể giúp bạn debug, review code, tạo PR, hoặc lên kế hoạch feature.',
  'YAMTAM Engine hiện có <code>3,437</code> skills và <code>93</code> agents sẵn sàng. Bạn cần loại nào?',
  'Dùng <code>/code-review</code> để review, <code>/debug</code> để trace lỗi, hoặc <code>/quick-commit</code> để commit nhanh.',
  'Tôi đang chạy trên <code>claude-sonnet-4-6</code>. Token budget còn rộng — cứ hỏi thoải mái.',
  'Mỗi câu hỏi được route qua middleware pipeline 9 bước trước khi tôi trả lời.',
];
let demoIdx = 0;

// ── Helpers ──
const feed  = document.getElementById('feed');
const input = document.getElementById('user-input');
const btn   = document.getElementById('send-btn');

function scrollBottom() { feed.scrollTop = feed.scrollHeight; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function appendMsg(role, html) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  if (role === 'ai') {
    const avEl = document.createElement('div');
    avEl.className = 'msg-av';
    const inner = document.createElement('div');
    inner.className = 'msg-av-inner';
    avEl.appendChild(inner);
    makeLottie(inner, false);

    const bub = document.createElement('div');
    bub.className = 'bubble';
    bub.innerHTML = html;

    wrap.appendChild(avEl);
    wrap.appendChild(bub);
  } else {
    const bub = document.createElement('div');
    bub.className = 'bubble';
    bub.innerHTML = html;

    const av = document.createElement('div');
    av.className = 'user-av';
    av.textContent = 'You';

    wrap.appendChild(bub);
    wrap.appendChild(av);
  }

  feed.appendChild(wrap);
  scrollBottom();
  return wrap;
}

function addThinking() {
  const wrap = document.createElement('div');
  wrap.className = 'msg ai';
  wrap.id = '_think';

  const avEl = document.createElement('div');
  avEl.className = 'msg-av';
  const inner = document.createElement('div');
  inner.className = 'msg-av-inner';
  avEl.appendChild(inner);
  const anim = makeLottie(inner, true);

  const bub = document.createElement('div');
  bub.className = 'think-wrap';
  bub.innerHTML = '<span></span><span></span><span></span>';

  wrap.appendChild(avEl);
  wrap.appendChild(bub);
  feed.appendChild(wrap);
  scrollBottom();
  return { el: wrap, anim };
}

async function typeIn(html) {
  // Strip tags for typing, set full HTML after
  const plain = html.replace(/<[^>]+>/g, '');

  const wrap = document.createElement('div');
  wrap.className = 'msg ai';

  const avEl = document.createElement('div');
  avEl.className = 'msg-av';
  const inner = document.createElement('div');
  inner.className = 'msg-av-inner';
  avEl.appendChild(inner);
  const av = makeLottie(inner, true);

  const bub = document.createElement('div');
  bub.className = 'bubble';

  wrap.appendChild(avEl);
  wrap.appendChild(bub);
  feed.appendChild(wrap);

  for (let i = 0; i <= plain.length; i++) {
    bub.textContent = plain.slice(0, i);
    scrollBottom();
    await sleep(16);
  }
  bub.innerHTML = html;
  av.stop();
  scrollBottom();
}

// ── Send ──
async function send() {
  const text = input.value.trim();
  if (!text || busy) return;
  busy = true;
  btn.disabled = true;
  input.value = '';
  input.style.height = '32px';

  appendMsg('user', esc(text));
  setState('thinking');
  const { el: thinkEl } = addThinking();

  await sleep(1100 + Math.random() * 900);

  thinkEl.remove();
  setState('responding');

  const reply = demos[demoIdx++ % demos.length];
  await typeIn(reply);

  setState('idle');
  busy = false;
  btn.disabled = false;
  input.focus();
}

// ── Events ──
btn.addEventListener('click', send);
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
input.addEventListener('input', function() {
  this.style.height = '32px';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
</script>
</body>
</html>
